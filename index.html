<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    <title>电池检测报价查询</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 顶部 -->
        <header class="header">
            <h1>电池检测报价查询</h1>
        </header>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="输入标准号，如 62619、31241、UN38.3..."
                    autocomplete="off" autocorrect="off" autocapitalize="off">
                <button id="clearBtn" class="clear-btn" style="display:none;">✕</button>
            </div>
            <div class="search-hints">
                <span class="hint-tag" data-hint="62619">62619</span>
                <span class="hint-tag" data-hint="31241">31241</span>
                <span class="hint-tag" data-hint="UN38.3">UN38.3</span>
                <span class="hint-tag" data-hint="62133">62133</span>
                <span class="hint-tag" data-hint="1642">UL1642</span>
            </div>
            <div id="suggestions" class="suggestions" style="display:none;"></div>
        </div>

        <!-- 结果区域 - 简洁线性排版 -->
        <div id="resultSection" class="result-section" style="display:none;">
            <div class="result-line name-line" id="resultName"></div>

            <div class="result-line">
                <span class="rl-label">样品数量：</span>
                <span id="resultSamples"></span>
            </div>

            <div class="result-line">
                <span class="rl-label">周期：</span>
                <span id="resultPeriod"></span>
            </div>

            <div class="result-line editable-line">
                <span class="rl-label">价格：</span>
                <span>电芯：</span>
                <input type="text" id="editCellPrice" class="price-input" placeholder="输入电芯价格">
                <span>，电池组/系统：</span>
                <input type="text" id="editBatteryPrice" class="price-input" placeholder="输入电池组价格">
            </div>

            <div class="result-line" id="industryLine" style="display:none;">
                <span class="rl-label">行业比价：</span>
                <span id="resultIndustryPrice"></span>
            </div>

            <div class="result-line" id="certFeeLine" style="display:none;">
                <span class="rl-label">证书费：</span>
                <span id="resultCertFee"></span>
            </div>

            <div class="result-line" id="totalPriceLine" style="display:none;">
                <span class="rl-label">威凯/机构报价：</span>
                <span id="resultTotalPrice"></span>
            </div>

            <div class="result-line" id="remarkLine" style="display:none;">
                <span class="rl-label">备注：</span>
                <span id="resultRemark"></span>
            </div>

            <div class="save-area">
                <button id="saveBtn" class="save-btn">💾 保存价格到Excel</button>
                <span id="saveMsg" class="save-msg"></span>
            </div>
        </div>

        <!-- 空状态 -->
        <div id="emptyState" class="empty-state">
            <p class="empty-title">输入标准号查询报价</p>
            <p class="empty-desc">支持 GB、IEC、UL、UN38.3、CCC 等标准</p>
            <div class="empty-examples">
                <div class="example-item" data-hint="62619">
                    <span class="example-code">IEC 62619</span>
                    <span class="example-name">工业用锂蓄电池</span>
                </div>
                <div class="example-item" data-hint="31241">
                    <span class="example-code">GB/T 31241</span>
                    <span class="example-name">便携式移动电源</span>
                </div>
                <div class="example-item" data-hint="UN38.3">
                    <span class="example-code">UN38.3</span>
                    <span class="example-name">危险货物运输</span>
                </div>
            </div>
        </div>

        <!-- 未找到 -->
        <div id="notFound" class="not-found" style="display:none;">
            <p>未找到匹配的标准</p>
            <p class="not-found-hint">请尝试输入标准编号的数字部分，如 62619、31241</p>
        </div>

        <!-- 加载中 -->
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>查询中...</p>
        </div>
    </div>

    <script src="search_index.json"></script>
    <script src="app.js"></script>
</body>
</html>
