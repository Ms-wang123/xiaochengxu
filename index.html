<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    <title>电池检测报价查询</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 顶部 -->
        <header class="header">
            <h1>电池检测报价查询</h1>
            <div class="header-actions">
                <button id="exportBtn" class="header-btn export-btn" title="导出Excel文件">导出Excel</button>
                <button id="loginBtn" class="header-btn" title="管理员登录">管理员登录</button>
                <button id="logoutBtn" class="header-btn" style="display:none;" title="退出登录">退出</button>
            </div>
        </header>

        <!-- 搜索区域 -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="输入标准号，如 62619、31241、UN38.3..."
                    autocomplete="off" autocorrect="off" autocapitalize="off">
                <button id="clearBtn" class="clear-btn" style="display:none;">✕</button>
            </div>
            <div class="search-hints">
                <span class="hint-tag" data-hint="62619">62619</span>
                <span class="hint-tag" data-hint="31241">31241</span>
                <span class="hint-tag" data-hint="UN38.3">UN38.3</span>
                <span class="hint-tag" data-hint="62133">62133</span>
                <span class="hint-tag" data-hint="1642">UL1642</span>
            </div>
            <div id="suggestions" class="suggestions" style="display:none;"></div>
        </div>

        <!-- 结果区域 - 线性排版 -->
        <div id="resultSection" class="result-section" style="display:none;">
            <!-- 标准名称 -->
            <div class="result-line name-line" id="resultName"></div>

            <!-- 样品数量 -->
            <div class="result-line">
                <span class="result-label">样品数量：</span>
                <span class="result-value" id="resultSamples"></span>
            </div>

            <!-- 检测周期 -->
            <div class="result-line">
                <span class="result-label">周期：</span>
                <span class="result-value" id="resultPeriod"></span>
            </div>

            <!-- 价格 -->
            <div class="result-line">
                <span class="result-label">价格：</span>
                <span class="result-value" id="resultPrice"></span>
            </div>

            <!-- 行业比价 -->
            <div class="result-line" id="industryLine" style="display:none;">
                <span class="result-label">行业比价：</span>
                <span class="result-value" id="resultIndustryPrice"></span>
            </div>

            <!-- 证书费 -->
            <div class="result-line" id="certFeeLine" style="display:none;">
                <span class="result-label">证书费：</span>
                <span class="result-value" id="resultCertFee"></span>
            </div>

            <!-- 威凯/机构报价 -->
            <div class="result-line" id="totalPriceLine" style="display:none;">
                <span class="result-label">威凯/机构报价：</span>
                <span class="result-value" id="resultTotalPrice"></span>
            </div>

            <!-- 备注 -->
            <div class="result-line" id="remarkLine" style="display:none;">
                <span class="result-label">备注：</span>
                <span class="result-value" id="resultRemark"></span>
            </div>

            <!-- 管理员可编辑价格区域 -->
            <div id="editPriceSection" class="edit-price-section" style="display:none;">
                <div class="edit-price-title">修改报价</div>
                <div class="edit-price-row">
                    <div class="edit-price-item">
                        <label>电芯价格</label>
                        <input type="text" id="editCellPrice" class="price-input" placeholder="输入电芯价格">
                    </div>
                    <div class="edit-price-item">
                        <label>电池组/系统价格</label>
                        <input type="text" id="editBatteryPrice" class="price-input" placeholder="输入电池组价格">
                    </div>
                </div>
                <div class="save-area">
                    <button id="saveBtn" class="save-btn">保存价格到Excel</button>
                    <span id="saveMsg" class="save-msg"></span>
                    <div id="excelPathInfo" class="excel-path-info" style="display:none;">
                        已保存至：<code>E:\weixin\报价-2025.9.9.xlsx</code>
                    </div>
                </div>
            </div>
        </div>

        <!-- 空状态/首页 - Sheet标签 + 表格 -->
        <div id="emptyState" class="empty-state">
            <!-- Sheet 标签切换 -->
            <div class="sheet-tabs" id="sheetTabs">
                <div class="sheet-tabs-loading">加载Sheet列表...</div>
            </div>
            <!-- 表格容器 -->
            <div class="table-wrapper" id="tableWrapper">
                <div class="table-loading" id="tableLoading">
                    <div class="spinner"></div>
                    <p>请选择上方Sheet查看表格</p>
                </div>
                <table id="excelTable" class="excel-table" style="display:none;">
                    <thead id="excelTableHead"></thead>
                    <tbody id="excelTableBody"></tbody>
                </table>
            </div>
            <div class="table-info" id="tableInfo" style="display:none;"></div>
        </div>

        <!-- 未找到 -->
        <div id="notFound" class="not-found" style="display:none;">
            <p>未找到匹配的标准</p>
            <p class="not-found-hint">请尝试输入标准编号的数字部分，如 62619、31241</p>
        </div>

        <!-- 加载中 -->
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>查询中...</p>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="loginModal" class="login-modal" style="display:none;">
        <div class="modal-overlay"></div>
        <div class="login-content">
            <div class="login-header">
                <h3>管理员登录</h3>
                <button id="closeLoginBtn" class="close-modal-btn">✕</button>
            </div>
            <div class="login-body">
                <div class="login-field">
                    <label>密码</label>
                    <input type="password" id="loginPassword" class="login-input" placeholder="请输入管理员密码">
                </div>
                <div id="loginError" class="login-error" style="display:none;"></div>
                <button id="doLoginBtn" class="login-submit">登录</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
